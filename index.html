<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>User Service</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .container { max-width: 400px; margin: 60px auto; background: white;
                 padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px #0001; }
    h2 { margin-bottom: 20px; color: #333; }
    input { width: 100%; padding: 10px; margin: 8px 0 16px;
            border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #5547b8; color: white;
             border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button:hover { background: #3f358a; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px;
           background: none; cursor: pointer; font-size: 14px; }
    .tab.active { background: #5547b8; color: white; border-color: #5547b8; }
    #msg { margin-top: 16px; padding: 10px; border-radius: 6px;
           font-size: 13px; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error   { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Нэвтрэх</button>
    <button class="tab" onclick="showTab('register')">Бүртгүүлэх</button>
  </div>

  <div id="login-form">
    <h2>Нэвтрэх</h2>
    <input id="login-user" placeholder="Хэрэглэгчийн нэр">
    <input id="login-pass" type="password" placeholder="Нууц үг">
    <button onclick="login()">Нэвтрэх</button>
  </div>

  <div id="register-form" style="display:none">
    <h2>Бүртгүүлэх</h2>
    <input id="reg-user"  placeholder="Хэрэглэгчийн нэр">
    <input id="reg-pass"  type="password" placeholder="Нууц үг">
    <input id="reg-email" placeholder="И-мэйл">
    <button onclick="register()">Бүртгүүлэх</button>
  </div>

  <div id="msg"></div>
</div>

<script>
const SOAP_URL = 'https://lab6soa-user-soap-service-xxxxx.ondigitalocean.app/ws';
  const NS        = 'http://example.com/users';

  function showTab(tab) {
    document.getElementById('login-form').style.display    = tab==='login'    ? '' : 'none';
    document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('active', (i===0) === (tab==='login'));
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = type;
    el.style.display = 'block';
  }

  function soapCall(body) {
    var env = '<soapenv:Envelope' +
      ' xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"' +
      ' xmlns:usr="' + NS + '">' +
      ' <soapenv:Body>' + body + '</soapenv:Body>' +
      '</soapenv:Envelope>';
    return new Promise(function(resolve, reject) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', SOAP_URL, true);
      xhr.setRequestHeader('Content-Type', 'text/xml');
      xhr.setRequestHeader('SOAPAction', '');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            resolve(xhr.responseText);
          } else {
            reject(new Error('Request failed'));
          }
        }
      };
      xhr.send(env);
    });
  }

  function getTag(xml, tag) {
    const m = xml.match(new RegExp(`<(?:[^:>]+:)?${tag}[^>]*>([^<]*)<`));
    return m ? m[1] : '';
  }

  async function login() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if (!u || !p) return showMsg('Талбаруудыг бөглөнө үү', 'error');

    const xml = await soapCall(
      '<usr:LoginUserRequest><usr:username>' + u + '</usr:username><usr:password>' + p + '</usr:password></usr:LoginUserRequest>'
    );
    const success = getTag(xml, 'success') === 'true';
    const token   = getTag(xml, 'token');

    if (success && token) {
      localStorage.setItem('token',    token);
      localStorage.setItem('username', u);
      window.location.href = 'profile.html';
    } else {
      showMsg(getTag(xml, 'message') || 'Нэвтрэлт амжилтгүй', 'error');
    }
  }

  async function register() {
    const u = document.getElementById('reg-user').value.trim();
    const p = document.getElementById('reg-pass').value.trim();
    const e = document.getElementById('reg-email').value.trim();
    if (!u || !p || !e) return showMsg('Бүх талбарыг бөглөнө үү', 'error');

    const xml = await soapCall(
      '<usr:RegisterUserRequest>' +
         '<usr:username>' + u + '</usr:username>' +
         '<usr:password>' + p + '</usr:password>' +
         '<usr:email>' + e + '</usr:email>' +
       '</usr:RegisterUserRequest>'
    );
    const success = getTag(xml, 'success') === 'true';
    const msg     = getTag(xml, 'message');
    showMsg(msg || (success ? 'Бүртгэл амжилттай' : 'Алдаа гарлаа'),
            success ? 'success' : 'error');
    if (success) setTimeout(() => showTab('login'), 1500);
  }
</script>
</body>
</html>
